pre-commit:
  parallel: true
  commands:
    biome:
      run: pnpm --dir frontend run biome
    backend-format:
      run: pnpm run backend:format
    knip:
      run: pnpm run knip
    typecheck:
      run: pnpm --dir frontend run typecheck
    frontend-test:
      run: pnpm --dir frontend run test
    backend-test:
      run: pnpm run backend:test
    backend-vet:
      run: pnpm run backend:vet
